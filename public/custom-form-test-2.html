<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Custom Form - v1</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: bold; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #4353ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
    <script type="text/javascript">
      (function() {
        var t = document.createElement('script'),
            s = document.getElementsByTagName('script')[0];
        t.async = true;
        t.id    = 'cio-forms-handler';
        t.setAttribute('data-site-id', 'siteid');
        t.setAttribute('data-base-url', 'http://localhost:9100');

        t.src = 'https://staging.customerioforms.com/assets/forms.js';

        s.parentNode.insertBefore(t, s);
      })();
    </script>
</head>
<body>
    <h1>Test Custom Form</h1>
    <p>Use this form to test Connected Forms scanning and rescanning.</p>

    <form id="test-signup" action="#" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" placeholder="First name">

        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" placeholder="Last name">

        <label for="company">Company</label>
        <input type="text" id="company" name="company" placeholder="Company name">

        <label for="interest">Interest</label>
        <select id="interest" name="interest">
            <option value="">Select...</option>
            <option value="product_demo">Product Demo</option>
            <option value="pricing">Pricing</option>
            <option value="support">Support</option>
        </select>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
